body:
  text: 卷一桂枝湯類一桂枝湯一甘草大棗補脾精以滋肝血芍藥清營中之熱桂枝達營氣之郁也桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚擘上五味㕮咀以水七升微火煮取三升去渣適寒溫服一升服已須臾啜熱稀粥一升余以助藥力桂枝本不能發汗故須助以熱粥內經云谷入於胃以傳於肺肺至皮毛汗所從出啜粥充胃氣以達於肺也觀此可知傷寒不禁食矣溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除此解肌之法也若如水流漓則動營氣衛邪仍在若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑桂枝湯全料謂之一劑三分之一謂之一服古一兩今二錢零則一劑之藥除薑棗僅一兩六錢零一服不過五錢零矣治傷寒大症分兩不過如此一服即汗不再服無汗服至二三劑總以中病為主後世見服藥得效者反令多服無效者即疑藥誤又復易方無往不誤矣禁生冷黏滑肉面五辛酒酪及臭惡等物太陽中風陽浮而陰弱風在外故陽脈浮衛氣有邪則不能護營故陰脈弱陽浮者熱自發風為陽邪故發熱桂枝之辛以散之陰弱者汗自出芍藥之酸以收之甘草之甘以緩之嗇嗇惡寒淅淅惡風惡風未有不惡寒者但惡寒甚輕非若中寒及陰經之甚也翕翕發熱其熱亦不如陽明之甚鼻鳴乾嘔者鼻鳴似屬陽明乾嘔似屬少陽蓋三陽相近故略有兼病但不甚耳桂枝湯主之太陽病頭痛發熱汗出惡風者桂枝湯主之此桂枝湯總症以營性發揚衛性斂閉風傷衛氣泄其皮毛故汗出也太陽病下之後其氣上衝者可與桂枝湯方用前法誤治若不上衝者不可與之此誤下之症誤下而仍上衝則邪氣猶在陽分故仍用桂枝發表若不上衝則其邪已下陷變病不一當隨宜施治論中誤治諸法詳觀自明太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈此非誤治因風邪凝結於太陽之要路則藥力不能流通故刺以解其結蓋邪風太甚不僅在衛而在經刺之以泄經氣風府一穴在項上入髮際一寸大筋內宛宛中督脈陽維之會刺入四分留三呼風池二穴在顳顬後髮際陷者中穴在耳後按之引於耳中足少陽陽維之會針入三分留三呼太陽病外證未解脈浮弱者當以汗解宜桂枝湯病雖過期脈症屬太陽仍不離桂枝法太陽病外證未解者不可下也此禁下總訣下之為逆欲解外者宜服桂枝湯言雖有當下之症而外症未除亦不可下仍宜解外而後下也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯脈浮而下此為誤下下後仍浮則邪不因誤下而陷入仍在太陽不得因已汗下而不復用桂枝也病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾榮氣和者言榮氣不病非調和之和故又申言之以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯自汗與發汗迥別自汗乃營衛相離發汗使營衛相合自汗傷正發汗驅邪復發者因其自汗而更發之則榮衛和而自汗反止矣病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時未熱之時發汗則愈宜桂枝湯主之無他病太陽諸症不必備而惟發熱自汗故亦用桂枝湯傷寒不大便六七日宜下之候頭痛有熱者未可與承氣湯太陽症仍在不得以日久不便而下也按未可二字從金匱增入傷寒論失此二字其小便清者知不在裡仍在表也便赤為里有熱當鬚髮汗若頭痛者必衄汗出而頭痛未解則蘊熱在經而血動矣宜桂枝湯傷寒發汗已解半日許復煩脈浮數者可更發汗發汗未透故煩乃服藥不及之故宜桂枝湯傷寒醫下之續得下利清穀不止里症身疼痛者表症急當救里此誤下之症邪在外而引之入陰故便清穀陽氣下脫可危雖表症未除而救里為急傷寒論不可下篇云誤下寒多者便清穀熱多者便膿血後身疼痛清便自調者急當救表清穀已止疼痛未除仍從表治蓋凡病皆當先表后里惟下利清穀則以扶陽為急而表症為緩也表裡分治而序不亂後人欲以一方治數症必至兩誤救里宜四逆湯救表宜桂枝湯太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯提出邪風二字見桂枝為驅風聖藥陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明本自多汗但不惡寒而惡熱今多汗而猶惡寒則仍在太陽矣雖陽明病而治從太陽太陰病脈浮者可發汗宜桂枝湯太陰本無汗法因其脈獨浮則邪仍在表故亦用桂枝從脈不從症也病人煩熱汗出則解又如瘧狀有時復熱日晡所發熱者屬陽明也日晡發熱則為陽明之潮熱而非瘧矣脈實者宜下之脈虛浮者宜發汗一症而治法迥別全以脈為憑此亦從脈而不從症之法下之與大承氣湯發汗宜桂枝湯下利腹脹滿里症身疼痛者表症先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此節屬厥陰症未必由誤治而得然既見表症亦宜兼治吐利止而身痛不休者當消息和解其外宜桂枝湯小和之里症除而表症猶在仍宜用桂枝法輕其劑而加減之可也傷寒大下後復發汗再誤心下痞邪入中焦惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯苦寒開降之法詳見後桂枝加附子湯二桂枝湯原方加附子一枚炮去皮破八片上六味以水七升煮取三升去渣溫服一升太陽病發汗遂漏不止此發汗太過如水流漓或藥不對症之故其人惡風中風本惡風汗後當愈今仍惡風則表邪未盡也小便難津液少四肢微急難以屈伸者四肢為諸陽之本急難屈伸乃津脫陽虛之象但不至亡陽耳若更甚而厥冷惡寒則有陽脫之慮當用四逆湯矣桂枝加附子湯主之桂枝同附子服則能止汗回陽桂枝加桂湯三桂枝原方加桂二兩即另立湯名治症迥別古聖立方之嚴如此桂枝湯原方加桂二兩上五味以水七升煮取三升去渣溫服一升燒針令其汗針處被寒復感新寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯不止一針故云各一壯與桂枝加桂湯重加桂枝不特禦寒且制腎氣又藥味重則能達下凡奔豚症此方可增減用之桂枝去芍藥湯四桂枝湯原方去芍藥上四味以水七升煮取三升溫服一升桂枝去芍藥加附子湯五即前方加附子一枚炮去皮破八片余依前法太陽病下之後脈促胸滿者中虛而表邪仍在桂枝去芍藥湯主之太陽之邪未盡故用桂枝下後傷陰不宜更用涼藥若微惡寒者去芍藥方中加附子湯主之微惡寒則陽亦虛矣故加附子桂枝加厚朴杏仁湯六桂枝湯原方加厚朴二兩炙去皮杏仁五十枚去皮尖上七味以水七升微火煮取三升溫服一升覆取微似汗喘家作桂枝湯加厚朴杏仁佳別録厚朴主消痰下氣本經杏仁主咳逆上氣太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之前條乃本然之喘此乃誤下之喘因殊而法一小建中湯七桂枝湯原方加膠飴一升上六味以水七升煮取三升去渣納飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也傷寒陽脈澀陰脈弦中宮之陽氣虛則木來乘土故陽澀而陰弦也法當腹中急痛先與小建中湯膠飴大甘以助中宮不瘥者與小柴胡湯主之治太陰不愈變而治少陽所以疏土中之木也以脈弦故用此法傷寒二三日心中悸而煩者小建中湯主之悸而煩其為虛煩可知故用建中湯以補心脾之氣蓋梔子湯治有熱之虛煩此治無熱之虛煩也桂枝加芍藥生薑人參新加湯八桂枝湯原方芍藥生薑各增一兩加人參三兩上六味以水一斗二升煮取三升去渣溫服一升此以多煎為妙取其味厚入陰也發汗後身疼痛表未盡脈沉遲氣虛已甚桂枝加芍藥生薑各一兩人參三兩新加湯主之邪未盡宜表而氣虛不能勝散藥故用人參凡素體虛而過汗者方可用桂枝甘草湯九桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去渣頓服此以一劑為一服者發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗不誤誤在過多汗為心之液多則心氣虛二味扶陽補中此乃陽虛之輕者甚而振振欲劈地則用真武湯矣一症而輕重不同用方迥異其義精矣茯苓桂枝甘草大棗湯十茯苓半斤桂枝四兩去皮甘草二兩炙大棗十五枚擘上四味以甘瀾水一斗以水二斗揚之萬遍取用按甘瀾水大約取其動極思靜之意先煮茯苓凡方中專重之藥法必先煮減二升納諸藥煮取三升去渣溫服一升日三服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之心下悸是擾胸中之陽臍下悸則因發汗太過上焦乾涸腎水上救故重用茯苓以制腎水桂枝以治奔豚桂枝麻黃各半湯十一桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃去節各一兩大棗四枚擘杏仁二十四枚去皮及雙仁者上七味以水五升先煮麻黃一二沸去上沫欲去沫故先煮納諸藥煮取一升八合減去三分之一去渣溫服六合一云桂枝湯三合麻黃湯三合併為六合頓服將息如上法太陽病得之八九日過經如瘧狀發熱惡寒熱多寒少邪已漸輕其人不嘔非少陽清便欲自可無裡熱一日二三度發非瘧象脈微緩者不浮不弦不大為欲愈也餘邪欲退之象脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也此三句申明上文欲愈之故蓋由病氣雖除而正氣亦衰當靜以養之使胃氣漸充則榮衛自和若更用汗吐下之法益虛其氣則病從藥增醫者不審誤人多矣面色反有熱色者未欲解也面有熱色則餘邪尚郁以其不能得小汗出身必癢宜桂枝麻黃各半湯微邪已在皮膚中欲自出不得故身癢以此湯取其小汗足矣陽明篇云身癢如蟲行皮中狀者此以久虛故也按此方分兩甚輕計共約六兩合今之稱僅一兩三四錢分三服只服四錢零乃治邪退後至輕之劑猶勿藥也桂枝二麻黃一湯十二桂枝一兩十七銖去皮芍藥一兩六銖甘草一兩二銖炙杏仁十六枚去皮尖麻黃十六銖去節生薑一兩六銖大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去渣溫服一升日再服一本云桂枝湯二升麻黃湯一升合為三升分再服今合為一方將息如前法服桂枝湯大汗出脈洪大者汗雖出而邪未盡與桂枝湯如前法此所謂邪不盡行復如法者也若形如瘧日再發者汗出必解宜桂枝二麻黃一湯主之此與桂枝麻黃各半湯意略同但此因大汗出之後故桂枝略重而麻黃略輕桂枝二越婢一湯十三桂枝湯加麻黃石膏二味桂枝去皮芍藥甘草炙麻黃去節各十八銖大棗四枚擘生薑一兩二銖切石膏二十四銖碎綿裹上七味以水五升煮麻黃一二沸去上沫納諸藥煮取二升去渣溫服一升附越婢方麻黃六兩甘草二兩石膏半斤生薑三兩大棗十五枚太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗此無陽與亡陽不同並與他處之陽虛亦別蓋其人本非壯盛而邪氣亦輕故身有寒熱而脈微弱若發其汗必至有叉手冒心臍下悸等症故以此湯清疏營衛令得似汗而解況熱多寒少熱在氣分尤與石膏為宜古聖用藥之審如此按以上三方所謂一二各半之説照方計算並不對準未知何説或云將本方各煎或一分或二分相和服此亦一法但方中又各藥注明分兩則何也存考桂枝去桂加茯苓白朮湯十四芍藥三兩甘草二兩炙生薑切茯苓白朮各三兩大棗十二枚擘上六味以水八升煮取三升去渣溫服一升小便利則愈此方專於利小便也服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之頭痛發熱桂枝症仍在也以其無汗則不宜更用桂枝心下滿則用白朮小便不利則用茯苓此症乃亡津液而有停飲者也凡方中有加減法皆佐使之藥若去其君藥則另立方名今去桂枝而仍以桂枝為名所不可解殆以此方雖去桂枝而意仍不離乎桂枝也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯十五桂枝湯原方去芍藥加蜀漆三兩洗去腥牡蠣五兩熬龍骨四兩上七味以水一斗二升先煮蜀漆減二升納諸藥煮取三升去渣溫服一升傷寒脈浮醫以火迫劫之亡陽必驚狂以火劫其胸中之陽起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之此與少陰汗出之亡陽迥別蓋少陰之亡陽乃亡陰中之陽故用四逆輩回其陽於腎中今乃以火遍汗亡其陽中之陽故用安神之品鎮其陽於心中各有至理不可易也去芍藥因陽虛不復助陰也蜀漆去心腹邪積龍骨牡蠣治驚癇熱氣桂枝甘草龍骨牡蠣湯十六桂枝一兩去皮甘草二兩炙牡蠣二兩熬龍骨二兩上四味以水五升煮取二升半去渣溫服八合日三服脈浮宜以汗解此治脈浮之總訣用火灸之誤治邪無從出因火而盛火反入內病從腰以下必重而痹名火逆也火氣在上則陰氣獨治於下故重而痹火逆下之又誤治因燒針煩躁者更誤治下之虛其陰燒針又益其陽則胸中益煩躁不寧矣桂枝甘草龍骨牡蠣湯主之鉦其陰氣散其火邪上下同治前方驚狂治重在心故用蜀漆此無驚狂象故蜀漆不用其症藥大段相同桂枝加葛根湯十七此湯成無己本有麻黃非有麻黃則為葛根湯矣桂枝湯原方加葛根四兩桂枝芍藥各減一兩餘同上六味以水一斗先煮葛根減二升去上沫納諸藥煮取三升去渣溫服一升覆取微似汗不須啜粥余如桂枝法將息太陽病項背強𠘧𠘧反汗出惡風者𠘧𠘧伸頸之象邪氣漸深故加葛根桂枝加葛根湯主之桂枝加芍藥湯十八桂枝湯原方芍藥加一倍上五味以水七升煮取三升溫服一升日三服桂枝加大黃湯十九此二方俱治太陰症而法不離乎桂枝桂枝湯原方加大黃一兩芍藥一倍上六味以水七升煮取三升去渣溫服一升日三服本太陽病醫反下之誤治因而腹滿時痛屬太陰也引邪入於太陰故所現皆太陰之症桂枝加芍藥湯主之雖見太陰症而太陽之症尚未罷故仍用桂枝湯只加芍藥一倍以斂太陰之症大實痛者此句承上文腹滿時痛言腹滿時痛不過傷太陰之氣大實痛則邪氣結於太陰矣桂枝加大黃湯主之此因誤下而見太陰之症大實痛則反成太陰之實邪仍用大黃引之即從太陰出不因誤下而禁下見症施治無不盡然按活人書云桂枝湯自西北人四時行之無不應驗江淮間惟冬及春可行之春末及夏至以前桂枝症可加黃芩一分謂之陽旦湯夏至後可加知母半兩石膏一兩或加升麻一分若病人素虛寒者不必加減麻黃湯類二麻黃湯一麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升此須多煮取其力專不僅為去上沫止煮一二沸矣去上沫納諸藥煮取二升半去渣溫服八合覆取微似汗不須啜粥以其易發汗也余如桂枝將息法活人書云夏至後用麻黃湯量加知母石膏黃芩蓋麻黃性熱恐有發黃斑出之慮太陽病頭痛發熱身疼腰痛骨節疼痛此痛處比桂枝症尤多而重因榮衛俱傷故也惡風無汗而喘者此二症乃肺氣不舒之故麻黃治無汗杏仁治喘桂枝甘草治太陽諸症無一味不緊切所以謂之經方麻黃湯主之太陽與陽明合病陽明之病象甚多如身熱不惡寒口苦鼻乾之類但見一二症即是不必全具也太陽病即上文所指者喘而胸滿者不可下病俱在上焦宜麻黃湯主之喘而胸滿此麻黃症之太陽合陽明也太陽病十日以去過經脈浮細邪已退而嗜臥者正漸復外已解也設胸滿脅痛者與小柴胡湯胸滿脅痛病延日久邪留少陽故與此湯脈但浮者與麻黃湯若果邪在少陽脈必帶弦今但浮則尚在太陽矣故仍用麻黃湯此亦從脈不從症之法太陽病脈浮緊無汗發熱身疼痛此乃太陽傷寒的症經云諸緊為寒八九日不解表證仍在表證即上文數端此當發其汗宜麻黃湯服藥已微除其人發煩目瞑陽鬱而不能外達劇者必衄衄乃解熱甚動血血由肺之清道而出與汗從皮毛而泄同故熱邪亦解俗語所云紅汗也經云陽明病口燥但欲漱水不欲咽者此必衄所以然者陽氣重故也風鬱固為熱寒鬱亦為熱內經云熱病者皆傷寒之類也麻黃湯主之此言未衄之前可用麻黃非衄後更用麻黃也脈浮者病在表可發汗宜麻黃湯此脈浮必帶緊脈浮而數者可發汗宜麻黃湯數為陽氣欲出傷寒脈浮緊不發汗失治因致衄者麻黃湯主之前段衄後而解則不必復用麻黃衄後尚未解則仍用此湯陽明病脈浮無汗而喘者陽明本脈大自汗今乃脈浮無汗而喘則為麻黃湯症矣發汗則愈宜麻黃湯麻黃杏仁甘草石膏湯二此即越婢湯加杏仁也麻黃四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去渣溫服一升發汗後不可更行桂枝湯既汗不可再汗津液不得重傷汗出而喘尚有留邪在肺故汗出而喘無大熱者邪已輕也可與麻黃杏仁甘草石膏湯汗出故用石膏喘故用麻杏發汗後飲水多者必喘以水灌之亦喘此二句明致喘之所由蓋喘未必皆由於水而飲水則無有不喘者戒之下後不可更行桂枝湯既下不可復汗津液不得兩傷若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯大青龍湯三此合麻黃桂枝越婢三方為一方而無芍藥麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚擘石膏碎如雞子大一塊上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去渣溫服一升取微似汗汗出多者溫粉撲之此外治之法論中無溫粉方明理論載白朮藁本川芎白芷各等分入米粉和勻撲之無藁本亦得後人用牡蠣麻黃根鉛粉龍骨亦可一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也太陽中風脈浮緊緊為陰脈故汗不易出發熱惡寒非惡風身疼痛不汗出而煩躁者邪深熱鬱大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也惡風乃桂枝症誤服此則汗不止而有亡陽之象矣立此方即垂此戒聖人之意深矣按此方合麻桂而用石膏何以發汗如是之烈蓋麻黃湯麻黃用二兩而此用六兩越婢湯石膏用半斤而此用雞子大一塊一劑之藥除大棗約共十六兩以今稱計之亦重三兩有餘則發汗之重劑矣雖少加石膏終不足以相制也少陰篇云脈陰陽俱緊反汗出者亡陽也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯主之脈不沉緊身有輕時為無少陰外症不厥利吐逆為無少陰里症此邪氣俱在外也故以大青龍發其汗按此條必有誤脈浮緩邪輕易散身不疼外邪已退乍有輕時病未入陰又別無少陰等症此病之最輕者何必投以青龍險峻之劑此必另有主方而誤以大青龍當之者也小青龍湯四痰喘證宜此俟氣平就枕然後以消痰潤肺養陰開胃之方以次調之麻黃去節芍藥細辛乾薑甘草炙桂枝去皮各三兩五味子半斤半夏半斤湯洗上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去渣溫服一升若微利者去麻黃加蕘花如雞子大熬令赤色利屬下焦陰分不可更發其陽蕘花明理論作芫花恐誤本草蕘花芫花花葉相近而蕘花不常用當時已不可得故改用芫花以其皆有去水之功也若渴者去半夏如栝蔞根三兩本草栝蔞根主消渴若噎者噎古作䭇論云寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇按內經無噎字疑即厄逆之輕者去麻黃加附子一枚炮本草附子溫中若小便不利少腹滿去麻黃加茯苓四兩小便不利而少腹滿則水不在上而在下矣故用茯苓若喘者去麻黃加杏仁半升去皮尖杏仁見前按此方專治水氣蓋汗為水類肺為水源邪汗未盡必停於肺胃之間病屬有形非一味發散所能除此方無微不到真神劑也傷寒表不解發汗未透心下有水氣即未出之汗乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之以上皆水停心下現症其每症治法皆在加減中傷寒心下有水氣咳而微喘發熱不渴凡水停心下者喘而不渴服湯已即小青龍湯也渴者此寒氣去欲解也寒飲欲去小青龍湯主之此倒筆法即指服湯已三字非謂欲解之後更服小青龍湯也麻黃附子細辛湯五麻黃去節二兩細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去渣溫服一升日三服少陰病始得之反發熱脈沉者麻黃附子細辛湯主之少陰病三字所該者廣必從少陰諸現症細細詳審然後反發熱知為少陰之發熱否則何以知其非太陽陽明之發熱耶又必候其脈象之沉然後益知其為少陰無疑也凡審症皆當如此附子細辛為少陰溫經之藥夫人知之用麻黃者以其發熱則邪猶連太陽未盡入陰猶可引之外達不用桂枝而用麻黃者蓋桂枝表裡通用亦能溫里故陰經諸藥皆用之麻黃則專於發表今欲散少陰始入之邪非麻黃不可況已有附子足以溫少陰之經矣麻黃附子甘草湯六麻黃去節二兩甘草二兩炙附子一枚炮去皮破八片上三味以水七升先煮麻黃一兩沸此當少煮去上沫納諸藥煮取三升去渣溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里症故微發汗也三陰經惟少陰與太陽為表裡而位最近故猶有汗解之理況二三日而無里症則其邪未深入此方較麻黃附子細辛少輕以其無里症也葛根湯類三葛根湯一此即桂枝湯加麻黃三兩葛根四兩葛根四兩麻黃三兩去節芍藥二兩生薑三兩切甘草二兩炙桂枝三兩去皮大棗十二枚擘上七味以水一斗先煮麻黃葛根二味主藥先煮減二升去上沫納諸藥煮取三升去渣溫服一升覆取微似汗不須啜粥已經發汗矣余如桂枝法將息及禁忌太陽病項背強几几無汗惡風葛根湯主之前桂枝加葛根湯一條其現症亦同但彼云反汗出故無麻黃此云無汗故加麻黃也陽明症汗出而惡熱今無汗而惡風則未全入陽明故曰太陽病按葛根本草治身大熱大熱乃陽明之症也以太陽將入陽明之經故加此藥太陽與陽明合病者必自下利葛根湯主之合病全在下利一症上審出蓋風邪入胃則下利矣葛根黃芩黃連湯二治發熱下利效如神葛根半斤甘草二兩炙黃芩三兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去渣分溫再服太陽病桂枝症桂枝症即太陽傷風之正病也醫反下之大誤利遂不止邪下陷則利無止時脈促者表未解也促有數意邪猶在外尚未陷入之陰而見沉微等象故不用理中等法喘而汗出者葛根黃芩黃連湯主之因表未解故用葛根因喘汗而利故用芩連之苦以泄之堅之芩連甘草為治利之主藥葛根加半夏湯三葛根湯原方加半夏半升洗煎服法同太陽與陽明合病不下利前條因下利而知太陽陽明合病今既不下利則合病何從而知必須從兩經本症一一對勘即不下利而亦可定為合病矣但嘔者葛根加半夏湯主之前條太陽誤下而成利則用芩連治利因其本屬桂枝症而脈促故止加葛根一味以解陽明初入之邪此條乃太陽陽明合病故用葛根湯全方因其但嘔加半夏一味以止嘔隨病立方各有法度柴胡湯類四小柴胡湯一發熱而嘔者如神柴胡半斤黃芩人參甘草炙生薑切各三兩半夏半斤大棗十二枚上七味以水一斗二升煮取六升去渣再煎此又一法取三升溫服一升日三服此湯除大棗共草八兩較今稱亦五兩六錢零雖分三服已為重劑蓋少陽介於兩陽之間須兼顧三經故藥不宜輕去渣再煎者此方乃和解之劑再煎則藥性和合能使經氣相融不復往來出入古聖不但用藥之妙其煎法俱有精義若胸中煩而不嘔者去半夏人參不嘔不必用半夏煩不可用人參加栝蔞實一枚栝蔞實除胸痹此小陷胸之法也若渴者去半夏半夏能滌痰濕即能耗津液加人參生津液合前成四兩半栝蔞根四兩治消渴若腹中痛者去黃芩苦寒加芍藥三兩除腹痛若脅下痞硬去大棗以其能補脾胃加牡蠣四兩別録云治脅下痞熱若心下悸小便不利者去黃芩加茯苓四兩利小便若不渴外有微熱者去人參不渴則津液自足加桂枝三兩微熱則邪留太陽溫覆取微似汗愈若咳者去人參大棗二味與嗽非宜生薑加乾薑故去生薑加五味子半升乾薑二兩古方治嗽五味乾薑必同用一以散寒邪一以斂正氣從無單用五味治嗽之法後人不知用必有害況傷熱勞祛火嗆與此處寒飲犯肺之症又大不同乃獨用五味收斂風火痰涎深入肺臟永難救療矣又按小柴胡與桂枝二方用處極多能深求其義則變化心生矣論中凡可通用之方必有加減法傷寒五六日正當傳少陽之期中風往來寒熱太陽之寒熱寒時亦熱熱時亦寒往來者寒已而熱熱已而寒也胸脅苦滿胸脅為少陽之位默默不欲飲食木邪乾土心煩喜嘔木氣上逆或胸中煩而不嘔或渴少陽火邪或腹中痛木剋土或脅下痞硬木氣填郁或心下悸有痰飲小便不利或不渴有蓄飲身有微熱太陽未盡或咳者肺有皆飲小柴胡湯主之少陽所現之症甚多柴胡湯所治之症亦不一加減法具載方末血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也此條申明所以往來寒熱及不欲食下痛上嘔之故皆因正衰邪入臟腑相牽所致則立方之意可推而知矣小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之此必先見少陽之症故用柴胡湯服後而渴則轉屬陽明矣傷寒四五日身熱惡風頸項強此是太陽所同脅下滿此則少陽所獨手足溫而渴者前條之渴者屬陽明此因脅下滿則雖似陽明不作陽明治矣小柴胡湯主之傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯主之詳見桂枝類中傷寒中風有柴胡證但見一證便是不必悉具少陽與太陽陽明相為出入一證可據雖有他證可兼治矣凡柴胡湯病證而下之誤治若柴胡證不罷者復與柴胡湯凡誤治而本證未罷仍用本證之方他經盡同不獨柴胡證也必蒸蒸而振卻復發熱汗出而解邪已陷下故必振動而後能達於外辨脈法篇云戰而汗出者其人本虛是以發戰發熱汗出邪仍從少陽而出傷寒十三日不解過經二候胸脅滿而嘔此少陽的症日晡所發潮熱此似陽明已而微利又現里症藥亂則症亦亂此本柴胡症下之而不得利今反利者知醫以丸藥下之非其治也以湯劑利之不應復以丸藥利之是謂重傷潮熱者實也先宜小柴胡湯以解外雖潮熱本屬少陽之邪故仍以柴胡解外後以柴胡加芒硝主之解在後加芒硝湯下傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結陽氣不能隨經而散故鬱結不舒非藥誤即遷延所致亦壞症之輕者必有表復有里也以上諸症有表有里柴胡湯兼治表裡脈沉亦在裡也脈細者必沉汗出為陽微以汗為徵假令純陰結不得復有外證悉入在裡陰則無汗此為半在裡半在表也脈沉為里汗出為表脈雖沉緊細即有緊象不得為少陰病所以然者陰不得有汗此為要訣今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解得湯而不了了者以有里症故大便硬必通其大便而後其病可愈其通便之法即加芒硝及大柴胡等方是也陽明病發潮熱大便溏小便自可胸脅滿而不去者與小柴胡湯陽明潮熱乃當下之症因大便小便自可則里症未具又胸脅嘗滿則邪留少陽無疑用此湯和解之陽明病脅下硬滿少陽症不大便可下而嘔亦少陽症舌上白苔者邪未結於陽明故舌苔白雖不大便不可下此要訣也可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也此四句申明小柴胡之功效如此所以諸症得之皆愈也按少陽之外為太陽里為陽明而少陽居其間故少陽之症有兼太陽者有兼陽明者內中見少陽一症即可用小柴胡湯必能兩顧得效仲景所以獨重此方也陽明中風脈弦浮大弦屬少陽浮大屬陽明而短氣腹都滿脅下及心痛此少陽症久按之氣不通鼻乾不得汗嗜臥此症又似少陰一身面目悉黃小便難此二症又似太陰有潮熱此似陽明耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈浮雖有里症邪仍欲外出脈但浮無餘證者與麻黃湯但浮無餘症則里症全無必從汗解故用麻黃湯此二條明陽明中風之症有里邪用小柴胡無里邪則用麻黃總以脈症為憑無一定法也若不尿膀胱氣絶腹滿加噦者不治論中陽明篇云陽明病不能食攻其熱必噦所以然者胃中虛冷故也虛冷二字尤明蓋陽微欲盡也又云大吐大下汗出怫鬱復與之水以發其汗因得噦靈樞云真邪相攻氣並相逆故為噦即厄逆也素問云病深者其聲噦乃肺胃之氣隔絶所致兼以腹滿故不治本太陽病不解轉入少陽者此為傳經之邪也脅下硬滿乾嘔不能食往來寒熱以上皆少陽本症尚未吐下脈沉緊者未吐下不經誤治也少陽已漸入里故不浮而沉緊則弦之甚者亦少陽本脈與小柴胡湯嘔而發熱者小柴胡湯主之但發熱而非往來寒熱則與太陽陽明同惟嘔則少陽所獨故亦用此湯太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯解見麻黃湯傷寒瘥以後更發熱者小柴胡湯主之此復症也非勞復非女勞復乃正氣不充餘邪未盡留在半表半裡之間故亦用小柴胡復病治法明著於此後世議論不一皆非正治脈浮者以汗解之脈沉實者以下解之復症之中更當考此二脈如果脈見浮象則邪留太陽當用汗法如脈見沉實則里邪未盡當用下法但汗下不著方名者因汗下之法不一醫者於麻黃桂枝及承氣大柴胡等方對症之輕重擇而用之則無不中病矣婦人中風七八日續得寒熱發作有時此即下文所謂如瘧也經水適斷者此為熱入血室其血必結血因熱結而成瘀矣故使如瘧狀發作有時小柴胡湯主之即以治瘧之法治之又云婦人中風發熱惡寒經水適來彼云斷此云來得之七八日熱除而脈遲身涼外邪內伏胸脅下滿如結胸狀譫語者此為熱入血室也血室為中焦營氣之所聚肝藏血心主血營血結滯則肝氣與心經之氣亦凝故脅滿而神昏譫語當刺期門隨其實而瀉之期門在乳下第二肋端去乳頭約四寸肝募也厥陰陰維之會刺入四分血結則為有形之症湯劑一時難效刺期門以瀉厥陰有餘之熱則尤親切而易散又云婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室晝清而夜昏者血室屬陰病在陰經也無犯胃氣及上二焦必自愈此為中焦營氣之疾汗下二法皆非所宜小柴胡湯刺期門則其治也按熱入血室之狀此二條為最詳婦人傷寒此症最多前條症稍輕後二條症尤重男子亦有之大柴胡湯二小柴胡去人參甘草加枳實芍藥大黃乃少陽陽明合治之方也柴胡半斤半夏半升洗黃芩三兩芍藥三兩生薑五兩切枳實四枚炙大棗十二擘上七味以水一斗二升煮取六升去渣再煎取三升溫服一升日三服此方本有大黃二兩王叔和云若不加大黃恐不為大柴胡也太陽病過經十餘日反二三下之一誤再誤後四五日柴胡證仍在者如寒熱嘔逆之類先與小柴胡湯嘔不止心下急鬱郁微煩者猶有里症為未解也與大柴胡湯下之則愈前雖已下非下法也以大柴胡兩解之傷寒十餘日熱結在裡此大黃之對症復往來寒熱者此柴胡之對症與大柴胡湯傷寒發熱汗出不解當用柴胡心中痞硬嘔吐而下利者邪內陷故用枳實半夏大黃大柴胡湯主之傷寒後後者過經之後諸症漸輕而未全愈也脈沉沉者內實也沉為在裡下解之宜大柴胡湯柴胡桂枝湯三此小柴胡與桂枝湯併為一方乃太陽少陽合病之方柴胡四兩黃芩人參桂枝芍藥生薑切各一兩半半夏二合半甘草一兩炙大棗六枚上九味水七升煮取三升去渣溫服一升傷寒六七日發熱微惡寒肢節疼煩以上太陽症微嘔心下支結以上少陽症外證未去者太陽症為外症柴胡桂枝湯主之發汗多亡陽詀語者此亡陽之輕者也不可下勿誤以為有燥屎之詀語故以為戒與柴胡桂枝湯和其營衛以通津液後自愈桂枝湯和營衛柴胡湯通津液深著二湯合用之功效而陽亡可復柴胡加龍骨牡蠣湯四柴胡四兩龍骨生薑切人參茯苓鉛丹黃芩牡蠣熬桂枝各一兩半半夏二合半洗大棗六枚擘大黃二兩上十二味以水八升煮取四升納大黃切如棋子大更煮一二沸大黃只煮一二沸取其生而流利也去渣溫服一升傷寒八九日下之即陷入里胸滿柴胡黃芩煩驚龍骨鉛丹牡蠣小便不利茯苓譫語大黃一身盡重不能轉側者茯苓柴胡加龍骨牡蠣湯主之此乃正氣虛耗邪已入里而復外擾三陽故現症錯雜藥亦隨症施治真神化無方者也按此方能下肝膽之驚痰以之治癲癇必效柴胡桂枝幹薑湯五柴胡半斤桂枝三兩去皮黃芩三兩乾薑牡蠣熬甘草炙各二兩栝蔞根四兩上七味以水一斗二升煮取六升去渣再煎取三升溫服一升日三服初服微煩復服汗出便愈邪氣已深一時不能即出如蒸蒸而振發熱汗出而解之類傷寒五六日已發汗而復下之一誤再誤胸脅滿用牡蠣微結小便不利渴以上皆少陽症渴故用栝蔞而不嘔故去半夏生薑但頭汗出陽氣上越用牡蠣往來寒熱用柴芩心下煩者黃芩牡蠣此為未解也柴胡桂枝幹薑湯主之柴胡加芒硝湯六柴胡湯原方加芒硝分兩各不同柴胡二兩十六銖黃芩甘草炙人參生薑切各一兩半夏二十銖大棗四枚擘芒硝二兩上八味以水四升煮取二升去渣納芒硝更煮微沸分溫再服不解更作不解不大便也此藥劑之最輕者以今稱計之約二兩分二服則一服止一兩耳按大柴胡湯加大黃枳實乃合用小承氣也此加芒硝乃合用調胃承氣也皆少陽陽明同治之方傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服小柴胡湯以解外後以柴胡加芒硝湯主之本草芒硝治六腑積聚因其利而復下之所謂通因通用之法也潮熱而利則邪不停結故較之大柴胡症用藥稍輕
