body:
  text: 卷二梔子湯類五梔子豉湯一梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取升半去渣分為二服溫進一服得吐者止後服此劑分兩最小凡治上焦之藥皆然發汗吐下後諸法俱用未必皆誤而正氣已傷矣虛煩不得眠虛為正氣虛煩為邪氣擾發汗吐下實邪雖去而其餘邪因正氣不充留於上焦故陽氣擾動而不得眠也若劇者必反復顛倒心中懊憹反復顛倒身不得寧也心中懊憹心不得安也梔子豉湯吐之此非汗下之所能除者吐之而痰涎結氣無不出矣按汗吐下之後而邪未盡則不在經而在肺胃之間為有形之物故必吐而出之反復顛倒心中懊憹摩寫病狀何等詳切凡醫者之於病人必事事體貼如若身受之而後用藥無誤發汗若下之而煩熱胸中窒者煩熱且窒較前虛煩等象為稍實梔子豉湯主之傷寒五六日大下之後誤治身熱不去心中結痛者未欲解也外內之邪俱未解結痛更甚於窒矣梔子豉湯主之按胸中窒結痛何以下用小陷胸蓋小陷胸症乃心下痛胸中在心之上故不得用陷胸何以不用瀉心諸法蓋瀉心症乃心下痞痞為無形痛為有象故不得用瀉心古人治病非但內外不失釐毫即上下亦不逾分寸也陽明病脈浮而緊咽燥口苦胸滿而喘發熱汗出不惡寒反惡熱身重以上皆陽明本症非因誤治而得者若發汗則躁心憒憒反譫語汗多陽虛若加燒針必怵惕煩躁不得眠即前以火逼汗亡陽驚狂之意若下之則胃中空虛客氣動膈心中懊憹以前因用三法未必合度故病不解各有現症如此舌上苔者此句乃要訣舌上有白苔則胸中有物而可用吐法否則邪尚未結恐無物可吐也梔子豉湯主之陽明病下之其外有熱表邪未盡手足溫不結胸無實邪心中懊憹飢不能食痰涎停結但頭汗出陽邪在上欲泄不泄梔子豉湯主之下利後更煩按之心上濡者濡者濕滯之象非窒非痛也為虛煩也宜梔子豉湯梔子甘草豉湯二梔子湯原方加甘草二兩炙上三味以水四升先煮梔子甘草取二升半內豉煮取升半分二服溫進一服得吐便止梔子生薑豉湯三梔子湯原方加生薑五兩先煮梔子生薑余俱如前法得吐者止後服凡用梔子湯病人舊微溏者不可與服之此服梔子湯之戒按梔子清越上焦之火與腸胃亦無大害微溏者即不可服未知何義想因大腸之氣滑脫者肺氣不宜更淺也若少氣者梔子甘草豉湯主之甘草能補中氣若嘔者梔子生薑豉湯主之此二條言凡遇當用梔子湯之病見此二症則加此二味也按無物為嘔有物為吐欲止其嘔反令其吐吐之而嘔反止真匪夷所思也梔子乾薑湯四梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去渣分二服溫進一服得吐者止後服傷寒醫以丸藥大下之下未必誤以丸藥大下則誤矣身熱不去外有微邪微煩者下後而煩即虛煩也梔子乾薑湯主之下後故用乾薑梔子厚朴枳實湯五梔子十四枚擘厚朴四兩薑灸枳實四枚水浸去稂炒煮服法同前傷寒下後心煩即微煩腹滿臥起不安者煩而加之腹滿則臥起俱不寧矣厚朴枳實以治腹滿也梔子厚朴湯主之梔子檗皮湯六梔子十五枚擘甘草一兩炙黃柏二兩上三味以水四升煮取升半去渣分溫再服傷寒身黃髮熱者梔子柏皮湯主之本草柏皮散臟腑結熱黃疸枳實梔子豉湯七枳實三枚炙梔子十四枚擘豉一升綿裹上三味以清漿水七升空煮又一煮法漿水即淘米之泔水久貯味酸為佳取四升納枳實梔子煮取二升下豉更煮五六沸去渣分溫再服覆令微似汗此不取吐而取汗大病瘥後勞復者勞復乃病後之餘症不在吐法故取微汗枳實梔子豉湯主之勞復因病後氣虛邪氣又結於上焦其症不一故不著其病形惟散其上焦之邪足矣後人以峻補之劑治勞復則病變百出矣若有宿食者納大黃如博棋子大五六枚此指勞復之有宿食者治食復之法亦在其中矣可吐篇云宿食在上脘當吐之按梔子湯加減七方既不注定何經亦不專治何誤總由汗吐下之後正氣已虛尚有痰涎滯氣凝結上焦非汗下之所能除經所云在上者因而越之則不動經氣而正不重傷此為最便乃不易之法也古方梔子皆生用故入口即吐後人作湯以梔子炒黑不復作吐全失用梔子之意然服之於虛煩症亦有驗想其清肺除煩之性故在也終當從古法生用為妙承氣湯類六大承氣湯一劉河間於此方加甘草二錢名三一承氣湯大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮厚朴枳實取五升去渣納大黃更煮取二升去渣納芒硝更上微火一兩沸分溫再服得下余勿服傷寒若吐若下後不解壞症不大便五六日上至十餘日日晡時發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視以上皆陽明危症因吐下之後竭其中氣津液已耗孤陽獨存胃中乾燥或有燥屎故現此等惡症脈弦者生澀者死弦則陰氣尚存且能剋制胃實澀則氣血已枯矣然弦者尚有可生之理未必盡生澀者斷無不死者也微者但發熱潮熱譫語者惡症皆無大承氣湯主之若一服利則止後服中病即止陽明病譫語有潮熱反不能食者客熱不能消穀胃中必有燥屎五六枚也若能食者但硬耳能食非真欲食不過粥飲猶可入口耳不能食則穀氣全不可近腸胃實極故也宜大承氣湯下之硬即可下按燥屎當在腸中今云胃中何也蓋邪氣結成糟粕未下則在胃中欲下則在腸中已結者即謂之燥屎言胃則腸已該矣汗出譫語者以有燥屎在胃中此為風也陽明本自汗出然亦有不汗出者此指明汗出之為風則知汗出乃表邪尚存不汗出者為火邪內結也須下者過經乃可下之此下之之時下之若早語言必亂輕於譫語以表虛里實故也下早則引表邪入里故表虛而裡實下之則愈宜大承氣湯雖已誤下然見譫語等症則更下之亦不因誤下而遂不復下也二陽並病同起者為合病一經未罷一經又病者為並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者以上皆陽明現症下之則愈宜大承氣湯陽明病下之心中懊憹而煩此乃下之未盡故有此實煩胃中有燥屎者可攻胃中燥屎必別有現症腹微滿初頭硬後必溏不可攻之僅微滿則無燥屎故不可攻若有燥屎者宜大承氣湯病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯詳解前桂枝湯下大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也惟有宿食故雖大下而燥屎終未盡宜大承氣湯病人不大便五六日繞臍痛正在燥屎之位煩躁發作有時者此有燥屎故使不大便也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也喘冒不臥燥屎現症宜大便有難無易所以乍易者以小便不利之故燥屎不以易便而去也宜大承氣湯以上三條皆證陽明有燥屎之法得病二三日脈弱無太陽柴胡證煩躁心下硬邪熱入里至四五日又隔二日雖能食以小承氣湯少少與微和之不必用全方只通其胃氣而已又用藥之一法令小安至六日又隔一日而病未除與大承氣湯一升亦不必用全方古人用藥雖現症鑿鑿而輕方小試敬慎小心如此若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬小便不利則水穀未盡分大便猶濕也攻之必溏須小便利屎定硬乃可攻之以小便之利否定宜下不宜下又一法宜大承氣湯傷寒六七日目中不了了睛不和皆陽盛之象無表裡證邪已結在裡大便難身微熱者此為實也邪結為實急下之宜大承氣湯陽明病此三字包陽明諸症發熱汗多者急下之此重在汗多恐內熱甚而逼陽於外以致亡陽也宜大承氣湯發汗不解腹滿痛者不解二字必兼有陽明症加以腹滿且痛則實邪有徵矣急下之宜大承氣湯腹滿不減減不足言雖略減而仍腹滿也當下之宜大承氣湯以上諸條舉當下之一二症即用下法然亦必須參觀他症而後定為妥陽明少陽合病必下利其脈不負者順也負者失也少陽屬木脈當弦緊陽明屬土脈當洪緩若少陽脈勝為負陽明脈勝為不負也厥陰篇云少陰負趺陽者為順也少陰屬水趺陽屬土土能勝水則胃氣尚強故為順即此意但彼處乃手足厥冷之利故屬少陰此則屬少陽為異耳互相剋賊名為負也脈滑而數者有宿食也滑數則陽明之脈獨見而過盛此為實邪故知有宿食當下之宜大承氣湯問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀有食反微澀此氣結不通之故故知有宿食當下之宜大承氣湯少陰病得之二三日陽邪初轉入陰口燥咽乾者急下之陽邪傳陰腎水欲涸故當急去其邪以保津液宜大承氣湯少陰病自利清水色純青純青則非寒邪乃肝邪入腎也難經云從前來者為實邪心下必痛口乾燥者二症尤見非寒邪急下之宜大承氣湯二條俱重口乾知為熱邪無疑少陰病六七日腹脹不大便者急下之不便而脹為日又久是以當下宜大承氣湯下利三部脈皆平無外邪症按之心下硬者實邪有形急下之宜大承氣湯下利脈遲而滑者內實也利未欲止當下之宜大承氣湯下利不欲食者以有宿食故也傷食惡食凡噤口利亦必因宿食之故當宜下之宜大承氣湯下利瘥後至其年月日復發者以病不盡故也當下之宜大承氣湯下利脈反滑當有所去脈滑則實邪不留下之乃愈宜大承氣湯病腹中滿痛者此為實也當下之宜大承氣湯脈雙弦而遲者必心下硬木邪乘土脈大而緊者陽中有陰也大為陽緊為陰可以下之宜大承氣湯按以上七條見傷寒論可下條內似指雜症可下法不入六經治法中小承氣湯二大承氣去芒硝厚朴枳實亦減大黃四兩酒洗枳實三枚大者炙厚朴二兩炙去皮上三味以水四升煮取一升二合去渣分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病脈遲雖汗出不惡寒者凡汗出者皆惡寒其身必重短氣腹滿而喘有潮熱者以上皆內實之症此外欲解不惡寒可攻裡也手足濈然汗出者此大便已硬也四肢為諸陽之本濈然汗出陽氣已盛於土中矣以此驗大便之硬又一法大承氣湯主之若汗多微發熱惡寒者外未解也其熱未潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下腹滿不通雖外未解亦可用小承氣此方乃和胃之品非大下之峻劑故也陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之潮熱而便不硬亦禁下若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也此以藥探之又一法乃可攻之若不轉失氣者以但初頭硬後必溏不可攻之攻之必脹滿不能食也邪氣因正虛而陷入欲飲水者與水則噦寒熱相爭則噦其後發熱者必大便復硬而少也重傷津液以小承氣湯和之仍用小承氣以大便硬故也不轉失氣者慎不可攻也又再申前戒聖人之慎下如此陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語譫語由便硬便硬由胃燥胃燥由汗出津液少層層相因病情顯著大承氣湯主之若一服譫語止更莫復服陽明病譫語發潮熱脈滑而疾者小承氣湯主之因滑疾則易下故止用小承氣因與小承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治攻之不應是為難治不可更與承氣湯也太陽病若吐若下若發汗後過治微煩小便數大便因硬者因字當著眼大便之硬由小便數之所致蓋吐下汗已傷津液而又小便太多故爾微硬非實邪也與小承氣湯和之愈下利譫語者有燥屎也利而仍譫語邪火不因利而息則必有燥屎蓋燥屎不因下利而去也後醫見利則不復下豈知燥屎之不能自出乎宜小承氣湯調胃承氣湯三大黃四兩去皮清酒洗甘草二兩炙芒硝半升上三味以水三升先煮大黃甘草取一升去渣納芒硝更上火微煮令沸少少溫服之按芒硝善解結熱之邪大承氣用之解已結之熱邪此方用之以解將結之熱邪其能調胃則全賴甘草也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯陰陽錯雜之症多方以救之必有餘邪在胃故少與以和之全詳雜方條發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯此必發汗後無他症但現微寒微熱故止作虛實觀否則安知非更有餘邪將復變他症耶太陽病未解脈陰陽俱停脈法無停字疑似沉滯不起即下微字之義寸為陽尺為陰先振栗汗出而解陰陽爭而復和但陽脈微者先汗出而解當發其陽但陰脈微者下之而解當和其陰若欲下之宜調胃承氣湯按此微字即上停字之意與微弱不同微弱則不當復汗下也傷寒十三日不解二候過經譫語者以有熱也當以湯下之如大小承氣之類若小便利者大便當硬而反下利脈調和者此言下後之症知醫以丸藥下之非其治也下非誤下之法誤若自下利者脈當微厥今反和者知為內實也調胃承氣湯主之當下而下非其法餘邪未盡仍宜更下太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩以上皆類少陽症先其時自極吐下者邪氣乘虛陷入與調胃承氣湯以滌胃邪若不爾者不可與未經吐下則邪在半表半裡不得用下法但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也此段疑有誤字調胃承氣湯陽明病不吐不下心煩者未經吐下而心煩中氣實也可與調胃承氣湯太陽病三日發汗不解蒸蒸發熱者屬胃也外邪已解內熱未清調胃承氣湯主之傷寒吐後腹脹滿者已吐而胃中仍滿則非上越所能愈復當下行矣與調胃承氣湯桃核承氣湯四桃仁五十個去皮尖大黃四兩甘草二兩桂枝二兩去皮芒硝二兩上五味以水七升煮取二升半去渣納芒硝更上火微沸下火先令溫服五合日三服當微利微利僅通大便不必定下血也太陽病不解熱結膀胱太陽之邪由經入腑其人如狂血自下下者愈膀胱多氣多血熱甚則血凝而上干心包故神昏而如狂血得熱而行故能自下則邪從血出與陽明之下燥屎同其外不解者尚未可攻外不解而攻之則邪反陷入矣當先解其外宜桂枝湯外解已但小腹急結者乃可攻之宜桃核承氣湯小腹急結是蓄血現症按宜桂枝湯四字從金匱增入抵當湯五水蛭熬虻蟲去翅足熬各三十個大黃三兩酒浸桃仁二十個去皮尖上四味以水五升煮取三升去渣溫服一升不下再服太陽病六七日過經表證仍在脈微而沉向里反不結胸向下其人發狂者以熱在下焦少腹當硬滿外症小便自利者內症下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之此亦熱結膀胱之症前桃核承氣乃治瘀血將結之時抵當乃治瘀血已結之後也太陽病身黃脈沉結少腹硬小便不利者為無血也以上皆似血症諦因小便不利安知非濕熱不行之故不可斷為有血也小便自利其人如狂者血證諦也並無濕熱而如狂非蓄血而何如此審證無遁形矣抵當湯主之陽明證其人喜忘者必有蓄血心主血血凝則心氣結而失其官矣蓄不甚故不狂所以然者本有久瘀血故令喜忘此乃舊病非傷寒時所得者屎雖硬大便反易血性滑利其色必黑浮血亦有隨便而下者宜抵當湯下之病人無表裡證發熱七八日過經雖脈浮數者可下之脈雖浮數而無表裡症則其發熱竟屬裡實矣七八日故可下假令已下脈數不解合熱則消穀善飢脈數不解邪本不在大便也消穀善飢蓄血本不在水穀之路故能食至六七日蓄血更久不大便者有瘀血也宜抵當湯其脈數不解而下不止必協熱而便膿血也此指服湯後之變症熱邪不因下而去又動其血則血與便合為一而為便膿血之症又當別有治法按瘀血又有但欲漱水不欲咽之症蓋唇口乾燥而腹中不能容水也抵當丸六水蛭熬虻蟲去翅足熬各二十個大黃三兩酒洗桃仁二十五個去皮尖上四味搗分四丸以水一升煮一丸取七合服之晬時當下血若不下者更服晬一周時也傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸熱而少腹滿又小便利必兼三者乃為血證諦不可余藥謂此症須緩下其血用丸使之徐下十棗湯七芫花熬甘遂大戟等分大棗十枚上三味各別搗為散以水一升半先煮大棗肥者十枚取八合去渣納藥末強人服一錢匕羸人服半錢得快下利後糜粥自養平旦溫服若下少病不除者明日更服加半錢太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛水停也乾嘔短氣汗出不惡寒者此表解里未和也不惡寒為表解以上諸症皆里不和凡蓄水之症皆如此不特傷寒為然也十棗湯主之服此湯以下蓄飲大陷胸湯八大黃六兩去皮芒硝一升甘遂一錢匕上三味以水六升先煮大黃取二升去渣納芒硝煮一兩沸納甘遂末溫服一升得快利止後服太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之經云病發於陽而反下之熱入因作結胸是也動數變遲正氣益虛膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之此段明所以致結胸之由及結胸之狀最詳乃因邪在上焦誤下以虛其上焦之氣而邪隨陷入也此症與承氣法迥殊若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也此乃誤下而邪氣不陷入上焦反鬱於皮膚肌肉之間故現此等症傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者此段申結胸之象尤明大陷胸湯主之傷寒十餘日過經熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也結胸本無他物氣與水所停也但頭微汗出者熱結在上大陷胸湯主之太陽病重發汗而復下之不大便五六日舌上燥而渴胸有蓄飲日晡所小有潮熱從心下至少腹硬滿而痛不可近者已汗下而大痛如此知非有物之實邪矣前云膈內拒痛又云心下石硬專指上焦説此云從心下至少腹硬滿痛則上下皆痛其根總由心下而起與承氣症自殊大陷胸湯主之傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之誤治柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解邪向里而更虛故汗出為難若心下滿而硬痛者此為結胸也大陷胸湯主之大陷胸丸九大黃半斤葶藶子熬芒硝杏仁去皮尖熬黑各半升上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效病發於陽而反下之熱入因作結胸病發於陰而反下之熱入因作痞此明所以致結胸與痞之故發熱惡寒之症則熱入於陽位而作結胸無熱惡寒之症則熱入於陰位而作痞故治結胸用寒劑治痞用溫劑也所以成結胸者以下之太早故也二病未嘗不可下但各有其時不可過早耳結胸者項亦強如柔痙狀此陷胸之外症下之則和宜大陷胸丸小陷胸湯十黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去渣納諸藥煮取二升去渣分溫三服一服未和再服微解下黃涎便安也按大承氣所下者燥屎大陷胸所下者蓄水此所下者為黃涎涎者輕於蓄水而未成水者也審病之精用藥之切如此小結胸病正在心下按之則痛上不至心下不及少腹必按之方痛非不可近乎與大陷胸症迥別脈浮滑者不若大陷胸症之沉緊其邪未入深也小陷胸湯主之白散十一桔梗貝母各三分古法二錢五分為一分巴豆一分去皮心熬黑研如脂上三味為散納巴豆更於臼中杵之以白飲和服強人服半錢匕今稱約重三分羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯巴豆得熱則行得冷則止身熱皮粟不解畏冷起寒粟欲引衣自覆者若以水潠之洗之益令熱劫不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法寒實結胸結胸皆系熱陷之症此云寒實乃水氣寒冷所結之痰飲也無熱證者與三物小陷胸湯白散亦可用按活人書云與三物白散無小陷胸湯亦可用七字蓋小陷胸寒劑非無熱之所宜也麻仁丸十二即小承氣加芍藥二仁也麻子仁二升芍藥枳實各半斤炙大黃一斤去皮厚朴一尺炙去皮杏仁一升去皮尖熬別研作脂上六味為末煉蜜和丸如梧子大飲服十丸日三服漸加以知為度趺陽脈浮而澀浮則胃氣強陽盛澀則小便數陰不足浮澀相搏大便則硬其脾為約此即論中所云太陽陽明者脾約是也麻仁丸主之太陽正傳陽明不復再傳故可以緩法治之
