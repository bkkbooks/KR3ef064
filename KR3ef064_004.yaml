body:
  text: 卷四雜法方類十二赤石脂禹餘糧湯一論中有汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸疑即此為丸赤石脂碎禹餘糧碎各一斤上二味以水六升煮取二升去渣分溫三服二石同煎方中絶少傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止一誤再誤醫以理中與之利益甚理中者理中焦也此利在下焦下藥太過則大腸受傷赤石脂禹餘糧湯主之以澀治脫復利不止者當利其小便分其清濁則便自堅炙甘草湯二又名復脈湯甘草四兩炙生薑三兩人參二兩生地黃一斤桂枝三兩去皮麥門冬半斤去心阿膠二兩麻仁半斤大棗三十枚擘上九味以清酒七升水八升先煮八味取三升去渣納膠煬消盡溫服一升日三服傷寒脈結代脈來緩而時一止復來曰結脈來動而中止不能自還因而復動曰代幾動一息亦曰代皆氣血兩虛而經隧不通陰陽不交之故心動悸心主脈脈之止息皆心氣不寧之故炙甘草湯主之此治傷寒邪盡之後氣血兩虛之主方也活人書云陰盛則結陽盛則促甘草乾薑湯三甘草四兩炙乾薑二兩炮上二味以水三升煮取一升五合去渣分溫再服芍藥甘草湯四芍藥四兩甘草四兩炙上二味以水三升煮取一升五合去渣分溫再服傷寒脈浮自汗出小便數心煩微惡寒以上俱似桂枝症腳攣急裡虛之象只此一症決非桂枝症矣凡辨症必於獨異處著眼反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者有陽越之象作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸此湯乃純陰之劑以復其陰也陰陽兩和而腳伸矣若胃氣不和譫語者留邪在中焦少與調胃承氣湯若重發汗復加燒針者四逆湯主之詳見四逆湯條下問曰證象陽旦活人書云桂枝湯加黃芩曰陽旦成無己云即桂枝湯別名按法治之而增劇厥逆咽中干兩脛拘急而譫語以上言按法用方而病不應手其故安在師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間桂枝加附子湯增桂令汗出附子溫經亡陽故也厥逆兩脛拘急即亡陽之兆厥逆咽中干煩躁陽明內結陽越在上譫語煩亂更飲甘草乾薑湯通納陽氣夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯陽復而陰又虛以此養陰氣爾乃脛伸以承氣湯微溏則止其譫語以滌陽明所結之餘邪故知病可愈病證象桂枝句以下歷敘治效以明用藥之次第當如此蓋病證既多斷無一方能治之理必先分證而施方而其先後之序又不可亂其方有前後截然相反者亦不得以錯雜為嫌隨機應變神妙無方而又規矩不亂故天下無不可愈之疾後人欲以一方治諸症又無一味中病之藥嗚呼難哉茵陳蒿湯五茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗先煮茵陳減六升茵陳為主藥納二味煮取三升去渣分溫三服小便當利尿如皂角汁狀色正赤一宿腹減病從小便去也先煮茵陳則大黃從小便出此祕法也陽明病發熱汗出者此為熱越不能發黃也但頭汗出者身無汗劑頸而還小便不利引水漿飲者此為瘀熱在裡身必發黃茵陳蒿湯主之本草茵陳主熱結黃疸傷寒七八日身黃如橘子色小便不利腹微滿者陽明瘀熱茵陳湯主之麻黃連軺赤小豆湯六麻黃二兩去節連軺二兩連翹根是赤小豆一升生梓白皮一升切杏仁四十枚去皮尖甘草二兩炙生薑二兩切大棗十二枚擘上八味以潦水一斗無根之水先煮麻黃再沸去上沫納諸藥煮取三升去渣分溫三服半日服盡連軺即連翹根氣味相近今人不採即以連翹代可也傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之前方欲黃從下解此方欲黃從汗解乃有表無表之分也麻黃升麻湯七麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖白朮石膏碎綿裹乾薑芍藥天冬去心桂枝去皮茯苓甘草各六銖炙上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去渣分溫三服相去如炊三斗米頃令盡汗出愈傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者皆上熱下寒之症為難治麻黃升麻湯主之此乃傷寒壞症寒熱互見上下兩傷故藥亦照症施治病症之雜藥味之多古方所僅見觀此可悟古人用藥之法瓜蒂散八瓜蒂熬黃赤小豆各一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去渣和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散此即論中所云吐法也梔子豉湯治虛煩非專引吐此方則專於引吐而已病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸中有寒也寒必兼飲當吐之在上者越之宜瓜蒂散本草瓜蒂病在胸腹中皆吐下之病人手足厥冷脈乍緊者邪結在胸中所以陽氣不能四達心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散吳茱萸湯九吳茱萸一升洗人參三兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去渣溫服七合日三服食谷欲嘔者必食谷而嘔受病在納穀之處與乾嘔迥別屬陽明也吳茱萸湯主之得湯反劇者屬上焦也上焦指胸中陽明乃中焦也少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之此胃氣虛寒之症乾嘔吐涎沫吐涎沫非少陽之乾嘔然亦云乾嘔者謂不必食谷而亦嘔也頭痛者陽明之脈上於頭吳茱萸湯主之此胃中有寒飲之症黃連阿膠湯十黃連四兩黃芩二兩芍藥二兩阿膠三兩雞子黃二枚上五味以水六升先煮三物煮取二升去渣納膠煬盡小冷納雞子黃小冷而納雞子黃則不至凝結而相和攪令相得溫服七合日三服少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之此少陰傳經之熱邪擾動少陰之氣故以降火養陰為治而以雞子黃引藥下達桃花湯十一赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去渣納赤石脂末方寸匕溫服七合日三服若一服愈余勿服兼末服取其留滯收澀少陰病下利便膿血者寒熱不調則大腸為腐故成膿血與下利清穀絶不同桃花湯主之本草赤石脂療下利赤白少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之半夏散及湯十二半夏洗桂枝去皮甘草炙上三味等分各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸納散兩方寸匕更煮三沸下火令小冷少少咽之治上之藥當小其劑少陰病咽中痛足少陰之脈循喉嚨挾舌本半夏散及湯主之本草半夏治喉咽腫痛桂枝治喉痹此乃咽喉之主藥後人以二味為禁藥何也豬膚湯十三豬膚一斤上一味以水一斗煮取五升去渣加白蜜一升白粉五合當是米粉熬香和令相得溫分六服少陰病下利咽痛胸滿心煩者此亦中焦氣虛陰火上炎之症豬膚湯主之以甘鹹納之甘草湯十四甘草二兩上一味以水三升煮取一升半去渣溫服七合日二服桔梗湯十五桔梗一兩甘草二兩上二味以水三升煮取一升去渣分溫再服少陰病二三日咽痛者可與甘草湯大甘為土之正味能制腎水越上之火不瘥與桔梗湯佐以辛苦開散之品別録云療咽喉痛苦酒湯十六半夏十四枚洗破如棗核雞子一枚去黃納上苦酒著雞子殼中上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸此等煮法必有深意疑即古所云禁方也去渣少少含咽之不瘥更作三劑少陰病咽中傷生瘡疑即陰火喉癬之類不能言語聲不出者苦酒湯主之咽中生瘡此必遷延病久咽喉為火所蒸腐此非湯劑之所能療用此藥斂火降氣內治而兼外治法也烏梅丸十七烏梅三百枚細辛六兩乾薑十兩當歸四兩黃連一斤附子六枚炮去皮蜀椒四兩出汗桂枝六兩去皮人參六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒脈微而厥至七八日膚冷陽氣不衛其人躁無暫安時者此為臟厥此症不治非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人常自吐蛔蛔厥者烏梅丸主之又主久利此治久利之聖方也其能治蛔諸藥之性當於神農本草中細細審辨諸方盡然不復一一俱載白頭翁湯十八治痢口渴下重者如神白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去渣溫服一升不愈更服一升熱利下重者白頭翁湯主之凡下重皆屬瘀熱下利欲飲水者以有熱故也白頭翁湯主之牡蠣澤瀉散十九牡蠣熬澤瀉蜀漆暖水洗去腥栝蔞根葶藶子熬商陸根熬海藻洗去咸以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕日三服小便利止後服大病瘥後從腰以下有水氣者水流向下牡蠣澤瀉散主之此治水病之主方蜜煎導方二十食蜜七合上一味於銅器內微火煎凝如飴狀攪之勿令焦著俟可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之豬膽汁方二十一大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出宿食惡物甚效陽明病自汗出若發汗小便自利者此乃津液內竭雖硬不可攻之當須自欲大便須待也言必得其自欲大便而後用此法宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導燒𥚛散二十二右取婦人中𥚛近陰處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈如人病取男子𥚛襠燒灰引其邪火從陰處出也傷寒陰陽易之為病病方愈而交接則感其餘熱而生疾其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒𥚛散主之六經脈證欲讀傷寒論必先識六經之本證然後論中所稱太陽陽明等病其源流變態形色脈象當一一備記瞭然於心然後其症之分並疑似及用藥加減異同之故可以曉然不致眩惑貽誤故備録於下太陽病脈浮頭項強痛而惡寒尺寸俱浮者太陽受病也其脈上連風府故頭項痛腰脊強太陽病發熱汗出惡風脈緩者名為中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊惡寒未離太陽也陽明病若能食名中風不能食名中寒尺寸俱長者陽明受病也其脈挾鼻絡於目故身熱目疼鼻乾不得臥陽明外證身熱汗自出不惡寒反惡熱也陽明脈大以上皆陽明之經病病有太陽陽明有正陽陽明有少陽陽明太陽陽明者脾約是也少陽陽明者發汗利小便已胃中燥煩實大便難是也陽明之為病胃家實也此乃正陽陽明陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也少陽之為病口苦咽乾目眩也尺寸俱弦者少陽受病也其脈循脅絡於耳故胸脅痛而耳聾少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒脈弦細頭痛發熱者屬少陽三陽合病脈浮大上關上但欲眠睡目合則汗內熱已極傷寒六七日無大熱外熱輕則內熱重其人躁煩者此為陽去入陰故也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也太陰之為病腹滿而吐食不下自利益甚時腹自痛尺寸俱沉細者太陰受病也其脈布胃中絡於嗌故腹滿而嗌乾傷寒脈浮而緩手足自溫者系在太陰自利不渴者屬太陰以臟有寒故也當溫之宜服四逆輩少陰自利而渴寒在下焦也此自利不渴寒在中焦也少陰之為病脈微細但欲寐也衛氣行於陽則寤行於陰則寐少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也尺寸俱沉者少陰受病也以其脈貫腎絡於肺系舌本故口燥舌乾而渴厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止尺寸俱微緩者厥陰受病也以其脈循陰器絡於肝故煩滿而囊縮厥陰中風脈微浮為欲愈不浮為未愈別症變症附刺法傷寒本症之外有別症有變症別症者其病與傷寒相類而實非傷寒是也變症者傷寒本不當有此症或因遷延時日或因雜藥誤投其病變態百出是也其症不備則必驚疑淆惑而無所措手故備録之庶不致臨症倣徨臟結冷結除中伏氣晚發痙濕風濕濕溫溫毒暍陰毒陽毒溫病熱病兩感風溫溫疫腳氣多眠狐惑百合臟厥見烏梅丸條尸厥見刺法臟結臟結如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治臟結無陽證其人反靜舌上苔滑者不可攻也病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死臟結與結胸皆下後邪氣乘虛入里所致熱多與陽明相結為結胸寒多與陰相結為臟結故所現脈症皆為陰象舌上苔滑則上焦亦寒全無陽象故曰難治曰不可攻然猶有治法至素有痞結則中氣已傷連及臍旁少腹併入陰經則上下俱病陰極陽竭不死何待冷結病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也除中傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘急為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中此病無治法伏氣伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷寒非喉痹也病人云實咽中痛雖爾今復欲下利活人書云伏氣之病謂非時有暴寒中人伏於少陰經始不竟病旬月乃發脈便微弱法先咽痛似傷寒非咽痹之病次必下利始用半夏桂枝甘草湯主之次四逆散主之此病只二日便瘥古方謂之腎傷寒也甘草半夏桂心等分每服四錢匕入生薑四片煎放冷少少含咽之晚發脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解活人書云傷寒病三月至夏為晚發痙太陽病發熱無汗反惡寒者名曰剛痓金匱治剛痓用葛根湯大承氣湯湯俱見前太陽病發熱汗出不惡寒者名曰柔痓柔痓用栝蔞桂枝湯即桂枝湯加栝蔞根二兩太陽病發汗太多因致痓太陽病發熱脈沉而細者名曰痓此言痓脈病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痓病也此言痓象濕太陽病關節疼痛而煩脈沉而細者此名濕痹之候其人小便不利大便反快但當利其小便濕家之為病一身盡疼發熱身色如似熏黃濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家下之其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈風濕問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也此言治法病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也風濕脈浮肢體痛重不可轉側額上微汗不欲去被或身微腫濕溫兩脛逆冷胸腹滿多汗頭目痛苦妄言其脈陽濡而弱陰小而急不可發汗治在太陰見活人書溫毒冬時觸冒疹毒至春始發肌肉發斑癮疹如錦紋或咳嗽心悶但嘔青汁見活人書暍太陽中熱者暍是也其人汗出惡寒身熱而渴也太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚陰毒手足厥冷背強臍腹築痛咽痛短氣嘔吐下利身如被杖或冷汗煩渴或甲指面色青黑煩燥而渴脈沉細欲絶而一息七至宜灸氣海丹田三二百壯或蔥尉臍中氣海在臍下一寸五分丹田在臍下二寸陽毒發躁狂走妄言面赤咽痛身斑斑若錦紋或下利赤黃脈洪實滑促或舌卷焦黑鼻中如煙煤宜用布漬冷水搭於胸上蒸熱數換活人書法溫病冬時受寒藏於肌膚至春而發熱病寒氣至夏而發俱與傷寒相似兩感太陽與少陰陽明與太陰少陽與厥陰風溫其人素傷於風因復傷熱其脈尺寸俱浮頭疼身熱常自汗出體重而喘四肢不收默默但欲眠發汗則譫語煩躁狀若驚癇溫疫一歲之中男女老少之疾相似其狀不一腳氣頭疼身熱肢體痛大便祕嘔逆腳屈弱多眠有風溫症有少陰症有小柴胡症有狐惑症狐惑此症治法詳金匱狀如傷寒或傷寒後變症默默欲眠目不能閉不欲飲食面目乍白乍赤乍黑蟲蝕其喉為惑其聲嘎蝕其肛為狐其咽乾爛見五臟則死當視其唇上唇有瘡蟲食其臟下唇有瘡蟲食其肛多因下利而得濕䘌之病亦相似百合此症詳金匱治法亦備此亦傷寒變症百脈一宗悉致其病百脈一宗乃肺病也故金匱用百合治之其狀欲食復不能食默默欲臥復不能臥欲行復不能行飲食或有美時或有惡聞食臭時如寒無寒如熱無熱小便赤藥入口即吐如有神靈者刺法古聖人治病之法針灸為先靈素所論皆為針灸而設即治傷寒亦皆用針刺熱病篇所載是也至仲景專以湯劑治傷寒尤為變化神妙然亦有湯劑所必不能愈而必用刺者仲景亦不能捨此而為治後人豈可不知故另考明諸穴以附於後尸厥少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕見平脈法期門二穴在第二肋端不容穴旁各一寸五分上直兩乳足太陰厥陰陰維之會舉臂取之刺入四分灸五壯肝募也巨闕一穴在鴆尾下一寸任脈氣所發刺入六分留七呼灸五壯心募也傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門縱者克其所勝放縱不收也傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門橫者犯其所不勝橫逆犯上也刺期門皆所以泄肝之盛氣期門穴見前太陽與少陽並病頭頸強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門大椎一穴在第一椎陷者中三陽督脈之會刺入五分灸九壯肺俞二穴在第三椎下兩旁各一寸五分刺入三分留七呼灸三壯肝俞二穴在第九椎下兩旁各一寸五分刺三四分留六呼灸三壯太陽少陰並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其熱而瀉之濈然汗出者愈此男子熱入血室之症婦人亦有之見小柴胡條下凡治溫病可刺五十九穴內經熱俞五十九頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也
