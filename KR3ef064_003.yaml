body:
  text: 卷三瀉心湯類七生薑瀉心湯一生薑四兩切甘草炙人參黃芩各三兩半夏半升洗黃連乾薑各一兩大棗十二枚擘上八味以水一斗煮取六升去渣再煎取三升溫服一升日三服傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之汗後而邪未盡必有留飲在心下其症甚雜而方中諸藥一一對症內中又有一藥治兩症者亦有兩藥合治一症者錯綜變化攻補兼施寒熱互用皆本內經立方諸法其藥性又有與神農本草所載無處不合學者能於此等方講求其理而推廣之則操縱在我矣凡瀉心諸法皆已汗已下已吐之餘疾甘草瀉心湯二即生薑瀉心湯去人參生薑加甘草一兩甘草四兩炙黃芩乾薑各三兩半夏半升洗黃連一兩大棗十二枚擘上六味以水一斗煮取六升去渣再煎取三升溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛兩次誤下故用甘草以補胃而痞自除俗醫以甘草滿中為痞嘔禁用之藥蓋不知虛實之義者也客氣上逆故使硬也甘草瀉心湯主之半夏瀉心湯三翻胃以此加減治之半夏半升洗黃芩乾薑甘草炙人參各三兩黃連一兩大棗十二枚擘上七味以水一斗煮取六升去渣再煎取三升溫服一升日三服傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解本症仍在則即用本方治之若心下滿而不痛者此為痞又指不痛二字痞症尤的柴胡不中與之宜半夏瀉心湯以上三瀉心之藥大半皆本於柴胡湯故其所治之症多與柴胡症相同而加治虛治痞之藥耳大黃黃連瀉心湯四大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去渣分溫再服此又法之最奇者不取煎而取泡欲其輕揚清淡以滌上焦之邪脈浮而緊而復下之緊反入里則作痞緊脈為陰此所謂病發於陰下之作痞是也按之自濡但氣痞耳並無脅下之水心下痞按之濡其脈關上浮者邪氣甚高大黃黃連瀉心湯主之傷寒大下後復發汗再誤心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯詳見前桂枝類中附子瀉心湯五大黃二兩酒浸黃連炒黃芩炒各一兩附子一兩去皮別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去渣納附子汁分溫再服此法更精附子用煎三味用泡扶陽欲其熟而性重開痞欲其生而性輕也心下痞而復惡寒汗出者附子瀉心湯主之此條不過二語而妙理無窮前條發汗之後惡寒則用桂枝此條汗出惡寒則用附子蓋發汗之後汗已止而猶惡寒乃表邪未盡故先用桂枝以去表邪此惡寒而仍汗出則亡陽在即故加入附子以回陽氣又彼先後分二方此並一方者何也蓋彼有表復有里此則只有里病故有分有合也黃連湯六即半夏瀉心湯去黃芩加桂枝黃連甘草炙乾薑桂枝去皮各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去渣溫服一升日三夜二服治上焦之病服藥宜少而數傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之諸瀉心之法皆治心胃之間寒熱不調全屬裡症此方以黃芩易桂枝去瀉心之名而曰黃連湯乃表邪尚有一分未盡胃中邪氣尚當外達故加桂枝一味以和表裡則意無不到矣黃芩湯七黃芩三兩甘草炙芍藥各二兩大棗十二枚擘上四味以水一斗煮取三升去渣溫服一升日再夜一服黃芩加半夏生薑湯八黃芩三兩甘草炙芍藥各二兩半夏半升洗生薑三兩切大棗十二枚擘上六味以水一斗煮取三升去渣溫服一升日再夜一服太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之下利即專於治利不雜以風寒表藥此亦急當救里之義若嘔亦即兼以止嘔之藥總之見症施治服藥後而本症愈復見他症則仍見症施治可推而知也乾薑黃連黃芩人參湯九乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去渣分溫再服傷寒本自寒下本症醫復吐下之誤治寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之此屬厥陰條寒格自用乾薑吐下自用芩連因誤治而虛其正氣則用人參分途而治無所不包又各不相礙古方之所以入化也旋覆代赭石湯十旋覆花三兩人參二兩生薑五兩甘草三兩炙半夏半升洗代赭石一兩大棗十二枚擘上七味以水一斗煮取六升去渣再煎取三升溫服升日三服傷寒發汗若吐若下解後病久治多未必皆屬誤治心下痞硬噫氣不除者靈樞口問篇云寒氣客於胃厥逆從下上散復出於胃故為噫俗名噯氣皆陰陽不和於中之故旋覆代赭湯主之此乃病已向愈中有留邪在於心胃之間與前諸瀉心法大約相近本草云旋覆治結氣脅下滿代赭治腹中邪毒氣加此二物以治噫余則散痞補虛之法也厚朴生薑甘草半夏人參湯十一厚朴半斤炙去皮生薑切半夏洗各半升甘草二兩人參一兩上五味以水一斗煮取三升去渣溫服一升日三服發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之發汗後則邪氣已去而猶腹脹滿乃虛邪入腹故以厚朴除脹滿余則補虛助胃也白虎湯類八白虎湯一知母六兩石膏一斤碎甘草二兩炙粳米六合上四味以水一斗煮米熟湯成火候去渣溫服一升日三服傷寒脈浮滑此表有熱里有寒此寒熱二字必倒誤乃表有寒里有熱也觀下條脈滑而厥者里有熱也鑿鑿可證活人書作表裡有熱亦未穩白虎湯主之傷寒脈滑而厥者熱厥里有熱也白虎湯主之三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿以上皆陽明熱症之在經者以三陽統於陽明也但身重腹滿則似風濕宜用朮附面垢譫語則似胃實宜用承氣此處一惑生死立判如何辨別全在參觀脈症使有顯據方不誤投發汗則譫語陽從此越下之則額上生汗手足逆冷陰從此脫若自汗出者白虎湯主之自汗則熱氣盛於經非石膏不治按亡陽之症有二下焦之陽虛飛越於外而欲上脫則用參附等藥以回之上焦之陽盛逼陰於外而欲上泄則用石膏以收之同一亡陽而治法迥殊細審之自明否則死生立判白虎加人參湯二白虎湯原方加人參三兩煮服同前法服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之煩渴不解因汗多而胃液乾枯邪雖去而陽明之火獨熾故用此以生津止汗息火解煩汗後諸變不同總宜隨症用藥傷寒若吐若下後前汗後此吐下後七八日不解熱結在裡表裡俱熱此四字為白虎對症時時惡風表邪未盡大渴舌上乾燥而煩欲飲水數升者胃液已盡不在經不在腑亦非若承氣症之有實邪因胃口津液枯竭內火如焚欲引水自救故其象如此與熱邪在腑者迥別白虎加人參湯主之傷寒無大熱熱在內口燥渴心煩背微惡寒者此亦虛燥之症微惡寒謂雖惡寒且甚微又周身不寒寒獨在背知外邪已解若大惡寒則不得用此湯矣白虎加人參湯主之傷寒脈浮發熱無汗無汗二字最為白虎所忌其表不解者惡寒不可與白虎湯渴欲飲水無表症者不惡寒白虎加人參湯主之白虎加參湯大段治汗吐下之後邪已去而有留熱在於陽明又因胃液乾枯故用之以生津解熱若更虛羸則為竹葉石膏湯症矣壯火食氣此方瀉火即所以生氣也竹葉石膏湯三竹葉二把石膏一斤半夏半斤洗人參二兩麥門冬一升去心甘草二兩炙粳米半升上七味以水一斗煮取六升去渣納粳米煮米熟湯成又一煮法去米溫服一升日三服傷寒解後虛羸少氣人參麥冬氣逆欲吐者半夏竹葉竹葉石膏湯主之此仲景先生治傷寒愈後調養之方也其法專於滋養肺胃之陰氣以復津液蓋傷寒雖六經傳遍而汗吐下三者皆肺胃當之又內經云人之傷於寒也則為病熱故滋養肺胃岐黃以至仲景不易之法也後之庸醫則用溫熱之藥峻補脾腎而千聖相傳之精義消亡盡矣五苓散類九五苓散一豬苓十八銖去皮澤瀉一兩六銖白朮十八銖茯苓十八銖桂枝半兩去皮上五味搗為散以白飲和服方寸匕日三服多飲暖水汗出愈如法將息服散取其停留胸中多飲暖水取其氣散營衛太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者以五苓散主之胃中干而欲飲此無水也與水則愈小便不利而欲飲此蓄水也利水則愈同一渴而治法不同蓋由同一渴而渴之象不同及渴之餘症亦各不同也發汗已脈浮數煩渴者五苓散主之汗不盡則有留飲中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆胸中有水則不能容水矣五苓散主之桂枝治表餘四味治里多飲暖水汗出愈表裡俱到本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之治痞而痞不解反渴則為水停心下之故非痞也太陽病寸緩關浮尺弱皆為虛象其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也誤治如其不下者病人不惡寒而渴者此轉屬陽明也此屬實邪小便數者大便必硬不更衣十日無所苦也渴欲飲水者少少與之但以法救之隨症施治不執一端渴者與五苓散如其渴不止五苓散亦一法也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之此亦表裡同治之法豬苓湯二豬苓去皮茯苓澤瀉滑石碎阿膠各一兩上五味以水四升先煮四味取二升去渣內阿膠煬消溫服七合日三服陽明病若脈浮發熱渴欲飲水小便不利者豬苓湯主之此陽明之渴故與五苓相近而獨去桂枝恐助陽也論中又云陽明汗多而渴不可與豬苓湯以胃中燥不可更利其小便也少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之此亦熱邪傳少陰之症蓋少陰口燥口乾有大承氣急下之法今止嘔渴則熱邪尚輕故用此方使熱邪從小便出其路尤近也文蛤散三文蛤五兩上一味為散以沸湯和一方寸匕服湯用五合病在陽應以汗解之反以冷水噀之若灌之其熱被劫不得去彌更益煩肉上粟起寒在肉中意欲飲水反不渴者服文蛤散此熱結在皮膚肌肉之中不在胃口故欲飲而不渴文蛤取其軟堅逐水若不瘥者與五苓散不應則表裡同治茯苓甘草湯四茯苓二兩桂枝二兩去皮甘草一兩炙生薑三兩切上四味以水四升煮取二升去渣分溫三服傷寒汗出而渴者五苓散主之桂枝止汗餘四味止渴不渴者茯苓甘草湯主之此方之義從未有能詮釋者蓋汗出之後而渴不止與五苓人所易知也乃汗出之後並無渴症又未指明別有何症忽無端而與茯苓甘草湯此意何居要知此處汗出二字乃發汗後汗出不止也汗出不止則亡陽在即當與以真武湯其稍輕者當與以茯苓桂枝白朮甘草湯更輕者則與以此湯何以知之以三方同用茯苓知之蓋汗大泄必引腎水上泛非茯苓不能鉦之故真武則佐以附子回陽此二方則以桂枝甘草斂汗而茯苓則皆以為主藥此方之義不了然乎觀下條心悸治法益明傷寒厥而心下悸者宜先治水水犯心則悸當服茯苓甘草湯本草茯苓治心下結痛恐悸卻治其厥不爾水漬入胃必作利也四逆湯類十四逆湯一甘草二兩炙乾薑一兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去渣分溫再服強人可大附子一枚常人則取中者小者可知乾薑三兩按方名四逆必以之治厥逆論云厥者陰陽氣不順接手足逆冷是也凡論中言脈沉微遲弱者則厥冷不待言而可知此方溫中散寒故附子用生者四逆理中皆溫熱之劑而四逆一類總不離乾薑以通陽也治宜下焦理中一類總不離白朮以守中也治宜中焦余藥皆相同而功用迥別傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者便作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯以上義詳雜方條內若重發汗復加燒針者四逆湯主之陰陽兩虛之後又復竭其陽非此湯不能挽回陽氣傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯説詳前桂枝條內病發熱頭疼此乃表邪脈反沉見里脈若不瘥身體疼痛當救其里宜四逆湯身體疼痛陰陽二症皆有之今脈沉而疼痛雖發熱亦是裡寒外熱之症故用四逆脈浮而遲表熱浮裡寒遲下利清穀者四逆湯主之自利不渴者屬太陰以其臟有寒故也明所以不渴之故當溫之宜四逆輩有寒則不渴則知渴者皆當作熱治不曰四逆湯而曰四逆輩凡溫熱之劑皆可選用少陰病脈沉者急溫之病與脈相合則溫不可遲宜四逆湯少陰病飲食入口則吐心中溫溫欲吐復不能吐此二句指不食之時言此與少陽之嘔當有分別宜以他症驗之始得之手足寒脈弦遲者此胸中實始得言病方起脈弦則有力故知為實不可下也欲吐則病在上焦下之為逆當吐之在上者因而越之此少陰宜吐之法若膈上有寒飲乾嘔者乾嘔無物則知其為飲矣不可吐也當溫之寒飲無實物溫之則寒散而飲亦去矣凡治飲皆用溫法宜四逆湯大汗出熱不去內拘急四肢疼以上皆外症其疼亦屬陰疼又下利清穀厥逆而惡寒者三者皆虛寒內症四逆湯主之按此條諸症皆屬陰寒因為易辨惟熱不去三字則安知非表邪未盡即惡寒亦安知非太陽未罷之惡寒惟下利厥逆則所謂急當救里不論其有表無表而扶陽不可緩矣大汗若大下利而厥冷者四逆湯主之汗下後而厥冷則虛寒極矣嘔而脈弱小便復利身有微熱見厥者難治亦外熱內虛寒之故四逆湯主之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之以上五條皆系汗下之後陽氣大虛故雖外有微熱而總以扶陽為急大小便俱利則內陽亦盡矣不僅手足逆冷為陽微之驗也四逆加人參湯二四逆湯原方加人參一兩煎服法同惡寒脈微而復利利止亡血也按亡陰即為亡血不必真脫血也成無己注引金匱玉函曰水竭則無血謂利止則津液內竭四逆加人參湯主之加參以生津液通脈四逆湯三甘草二兩炙乾薑三兩強人四兩附子大者一枚生用去皮破八片上三味以水三升煮取一升二合去渣分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩補益津液病皆與方相應者乃服之少陰病下利清穀裡寒外熱寒逼陽於外手足厥逆外症脈微欲絶內症身反不惡寒寒邪已入里其人面色赤陽越或腹痛或乾嘔或咽痛陽升或利止脈不出者通脈四逆湯主之其脈即出者愈諸症或陽或陰乃閉塞不通之故用辛溫通陽之品以治之其兼症不同詳加減法下利清穀裡寒外熱汗出而厥者汗出而厥陽有立亡之象通脈四逆湯主之通脈四逆加豬膽汁湯四通脈四逆原方加豬膽汁半合煎如前法煎成納豬膽汁溫服其脈即出豬膽汁苦滑之極引藥直達下焦吐已下斷利止也汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之乾薑附子湯五乾薑一兩附子一枚生用去皮切八片上二味以水三升煮取一升去渣頓服下之後復發汗先竭其陰後竭其陽晝日煩躁不得眠夜而安靜陽虛有二症有喜陽者有畏陽者大抵陰亦虛者畏陽陰不虛者喜陽此因下後陰亦虛故反畏陽也不嘔不渴無表證脈沉微身無大熱者此邪已退而陽氣衰弱故止用薑附回陽乾薑附子湯主之白通湯六乾薑附子湯原方加蔥白四莖煎服法照前少陰病下利白通湯主之此專治少陰之利用蔥白所以通少陰之陽氣白通加豬膽汁湯七白通湯原方加人尿五合豬膽汁一合上三味以水三升煮取一升去渣納膽汁人尿和令相得分溫再服若無膽汁亦可少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者無脈厥逆嘔而且煩則上下俱不通陰陽相格故加豬膽人尿引陽藥達於至陰而通之內經所云反佐以取之是也白通加豬膽汁湯主之服湯脈暴出者死微續者生暴出乃藥力所迫藥力盡則氣乃絶微續乃正氣自復故可生也少陰篇云少陰病下利不止惡寒而踡臥手足溫者可治則又當以手足之溫驗其陽之有無也前云其脈即出者愈此云暴出者死益暴出與即出不同暴出一時出盡即出言服藥後少頃即徐徐微續也須善會之茯苓四逆湯八茯苓四兩一本作六兩人參一兩附子一枚生用破八片甘草二兩炙乾薑一兩半上五味以水五升煮取三升去渣溫服七合日三服發汗若下之病仍不解煩躁者此陽氣不攝而煩所謂陰煩也然亦必參以他症方不誤認為梔子湯症茯苓四逆湯主之本草茯苓治逆氣煩滿四逆散九甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令坼泄利下重者先以水五升煮薤白取三升去渣以散三方寸匕納湯中煮取一升半分溫再服別録薤白主溫中散結少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者此乃少陰傳經之熱邪並無脈微惡寒等陰症即下利一端並非清穀而反下重故不得用溫熱四逆散主之疏邪通氣同名四逆與前諸法迥殊諸兼症皆在加減中當歸四逆湯十治利極神當歸桂枝芍藥細辛各三兩甘草通草各二兩大棗二十五枚上七味以水八升煮取三升溫服一升日三服當歸四逆加吳茱萸生薑湯十一當歸三兩甘草通草各二兩芍藥桂枝細辛各三兩大棗二十五枚吳茱萸二升生薑半斤上九味以水六升清酒六升和煮取五升去渣分溫五服手足厥寒脈細欲絶者當歸四逆湯主之此四逆乃太陽傳經之邪而表症猶未罷因陽氣已虛故用桂枝湯加當歸和血細辛溫散以和表裡之陽也若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之內有久寒指平素言必從問而得之或另有現症乃為可據吳茱萸溫中散寒其性更烈按前四逆諸法皆主於溫此二方則溫中兼通陽和陰之法下利脈大者虛也凡症虛而脈反大者皆元氣不固也以其強下之故也惟求所以致虛之故設脈浮革辨脈法篇云脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革因而腸鳴者腸鳴亦氣不通和之故屬當歸四逆湯主之理中湯類十一熟讀在胸救人無算與時醫所論陰陽迥不相同理中丸一折三劑每味三錢人參甘草炙白朮乾薑各三兩上四味搗篩為末蜜和為丸如雞子黃許大以沸湯數合和一丸研碎溫服之日三四服夜二服腹中未熱益至三四丸然不及湯理中丸與湯本屬一方湯法以四物依兩數切用水八升煮取三升去渣溫服一升日三服急則用湯若臍上築者腎氣動也去朮加桂四兩即欲作奔豚桂枝加桂之法吐多者去朮加生薑三兩有乾薑而復加生薑知乾薑不治嘔也下多者還用術術能止利悸者加茯苓二兩悸為心下有水故用茯苓渴欲飲水者加朮足前成四兩半消飲生津腹中痛者加人參足前成四兩半此痛因氣不足之故別録云人參治心腹鼓痛寒者加乾薑足前成四兩半腹滿者去朮加附子一枚此腹滿乃陽氣不充之故服湯後如食頃飲熱粥一升許微自溫勿揭衣被桂枝湯之飲熱粥欲其助藥力以外散此飲熱粥欲其助藥力以內溫霍亂頭痛發熱身疼痛論中又云嘔吐而利名曰霍亂又云頭痛則身疼惡寒吐利名曰霍亂合觀之則霍亂之症始備蓋亦傷寒之類後人以暑月之吐利當之而亦用理中更造為大順散者皆無稽之論也熱多欲飲水者五苓散主之此熱勝寒之霍亂寒多不用水者理中湯主之此寒勝熱之霍亂按霍亂之症皆由寒熱之氣不和陰陽拒格上下不通水火不濟之所致五苓所以分其清濁理中所以壯其陽氣皆中焦之治法也大病瘥後喜唾胃液不藏兼有寒飲久不了了胃上有寒當以丸藥理之當緩治之宜理中丸真武湯二茯苓芍藥生薑切各三兩白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去渣溫服七合日三服若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩此即下利清穀之類故去芍藥加乾薑若熱利則芍藥又為要藥也須審之若嘔者去附子加生薑足前為半斤太陽病發汗汗出不解太陽病乃桂枝症也其發汗當取微似汗則衛氣泄而不傷營若發汗太過動其營血大汗雖出而衛邪反內伏所以病仍不解觀前桂枝湯條下服法可推而知也其人仍發熱表邪仍在心下悸下焦腎水因心液不足隨陽而上犯頭眩身瞤動振振欲劈地者陽氣泄則虛浮無依著真武湯主之此方鉦伏腎水挽回陽氣少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者以上濕邪之症此為有水氣水亦濕也其人或咳或小便利或下利或嘔者此四症或有或無方中加減法俱詳真武湯主之此方因發汗不合法上焦之津液乾枯腎水上救以此鉦腎氣治逆水不專為汗多亡陽而設治亡陽之方諸四逆湯乃正法也附子湯三附子二枚炮去皮破八片茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去渣溫服一升日三服少陰病得之一二日口中和寒邪已微其背惡寒者當灸之但背惡寒則寒邪聚於一處故用灸法按白虎加人參湯亦有背微惡寒之症乃彼用寒涼此用溫熱何也蓋惡寒既有微甚之不同而其相反處全在口中和與口燥渴之迥別故欲知里症之寒熱全在渴不渴辨之此傷寒之要訣也附子湯主之此乃病已向愈正氣虛而余寒尚存之證也少陰病身體痛手足寒骨節痛脈沉者附子湯主之此亦虛寒餘症甘草附子湯四甘草二兩炙白朮二兩桂枝四兩去皮附子二枚炮去皮破上四味以水六升煮取三升去渣溫服一升日三服初服得微汗則解即服桂枝湯論中所云風濕發汗汗大出者但風氣去濕氣在是故不愈也治風濕者發其汗但微微似欲出汗者風濕俱去也能食汗出復煩者尚有餘邪鬱而未盡服五合恐一升多者服六七合為始此言初服之始風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之此段形容風濕之狀病情略備桂枝附子湯五桂枝四兩去皮附子三枚炮去皮切八片甘草二兩炙生薑三兩切大棗十二枚擘上五味以水六升煮取二升去渣分溫三服按此即桂枝去芍藥加附子湯但彼桂枝用三兩附子用一枚以治下後脈促胸滿之症此桂枝加一兩附子加二枚以治風濕身疼脈浮澀之症一方而治病迥殊方名亦異彼編入桂枝湯類此編入理中湯類細思之各當其理分兩之不可忽如此義亦精矣後人何得以古方輕於加減也桂枝附子去桂加白朮湯六白朮四兩甘草二兩附子三枚炮去皮破生薑三兩切大棗十二枚擘上五味以水六升煮取二升去渣分溫三服初一服其人身如痹半日許復服之三服都盡其人如冒狀勿怪此以附子術並走皮內逐水氣附術併力則逐水之功愈大未得除故使之耳法當加桂四兩此即前桂枝附子湯此本一方二法以大便硬小便自利去桂也以大便不硬小便不利當加桂觀此條知桂枝能通小便故五苓散用之附子三枚恐多也虛弱家及産婦宜減服之附子能劫陰氣傷寒八九日風濕相搏身體疼煩不能自轉側濕則身重不嘔不渴濕而兼寒脈浮虛而澀者內外之陽俱虛桂枝附子湯主之若其人大便硬小便自利者去桂加白朮湯主之白朮生腸胃之津液茯苓桂枝白朮甘草湯七茯苓四兩桂枝三兩去皮白朮甘草各二兩炙上四味以水六升煮取三升去渣分溫三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之此亦陽虛而動腎水之症即真武症之輕者故其法亦仿真武之意芍藥甘草附子湯八芍藥甘草各三兩炙附子一枚炮去皮破八片上三味以水五升煮取一升五合去渣分溫三服發汗病不解反惡寒者虛故也芍藥甘草附子湯主之甘草附子加芍藥即有和陰之意亦邪之甚輕者桂枝人參湯九桂枝四兩別切甘草四兩炙白朮人參乾薑各三兩上五味以水九升先煮四味取五升納桂更煮取三升桂獨後煮欲其於治里症藥中越出於表以散其邪也去渣溫服一升日再夜一服太陽病外證未除而數下之下之太早又多遂協熱而利利下不止邪陷入里心下痞硬邪在上焦猶屬半表表宜桂枝里宜餘四味不解者桂枝人參湯主之此必數下之後而現虛症故雖協熱而仍用溫補
